name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install app deps
        working-directory: omega-hydra-app
        run: npm install

      - name: Build app
        working-directory: omega-hydra-app
        run: npm run build

      - name: Apply Supabase schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/run-schema.js

      - name: Deploy tracking worker
        env:
          WORKER_DEPLOY_COMMAND: ${{ secrets.WORKER_DEPLOY_COMMAND }}
          WORKER_ENDPOINT: ${{ secrets.WORKER_ENDPOINT }}
        run: node scripts/deploy-worker.js

      - name: Health check
        env:
          HEALTH_CHECK_URL: ${{ secrets.HEALTH_CHECK_URL }}
          WORKER_ENDPOINT: ${{ secrets.WORKER_ENDPOINT }}
        run: node scripts/health-check.js

      - name: Deployment summary
        run: echo "CEO Dashboard deployment complete."
