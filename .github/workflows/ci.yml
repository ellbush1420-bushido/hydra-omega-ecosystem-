name: CI

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  app-build:
    name: App lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: omega-hydra-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: omega-hydra-app/package-lock.json

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck when available
        run: |
          if npm run | grep -q "typecheck"; then
            npm run typecheck
          else
            echo "No typecheck script found; skipping."
          fi

      - name: Build
        run: npm run build

  rust-workspace:
    name: Rust workspace tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace
